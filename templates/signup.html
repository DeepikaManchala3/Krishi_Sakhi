{% extends "base.html" %}

{% block title %}Sign Up - Krishi Sakhi{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6 col-lg-5">
        <div class="card shadow">
            <div class="card-header text-center bg-success text-white">
                <h4 id="form-title"><i class="fas fa-user-plus me-2"></i>Create Account</h4>
            </div>
            <div class="card-body">
                <form method="POST">
                    <!-- Name -->
                    <div class="mb-3">
                        <label for="name" class="form-label" id="label-name">Name</label>
                        <div class="input-group">
                            <input type="text" class="form-control" id="name" name="name" required>
                            <button type="button" class="btn btn-outline-secondary" onclick="startVoiceInput('name')">
                                🎤
                            </button>
                        </div>
                    </div>

                    <!-- Phone Number -->
                    <div class="mb-3">
                        <label for="phone_number" class="form-label" id="label-phone">Phone Number</label>
                        <div class="input-group">
                            <input type="tel" class="form-control" id="phone_number" name="phone_number" required>
                            <button type="button" class="btn btn-outline-secondary" onclick="startVoiceInput('phone_number')">
                                🎤
                            </button>
                        </div>
                    </div>
                    
                    <!-- Preferred Language -->
                    <div class="mb-3">
                        <label for="language_preference" class="form-label" id="label-language">Preferred Language</label>
                        <select class="form-select" id="language_preference" name="language_preference" onchange="changeLanguage(this.value)" required>
                            {% for code, name in languages.items() %}
                            <option value="{{ code }}">{{ name }}</option>
                            {% endfor %}
                        </select>
                    </div>

                   <!-- Location -->
           <!-- Hidden Location -->
<input type="hidden" id="location" name="location">



                    <!-- Submit -->
                    <div class="d-grid">
                        <button type="submit" class="btn btn-success btn-lg" id="btn-signup">
                            <i class="fas fa-user-plus me-2"></i>Sign Up
                        </button>
                    </div>
                </form>
                
                <div class="text-center mt-3">
                    <p id="login-text">Already have an account? <a href="{{ url_for('login') }}" id="login-link">Login here</a></p>
                </div>
            </div>
        </div>
    </div>
</div>

<!-- JS for Language Switch + Location + Voice -->
<script>
    const translations = {
        "en": {
            "title": "Create Account",
            "name": "Name",
            "phone": "Phone Number",
            "language": "Preferred Language",
            "signup": "Sign Up",
            "login": "Already have an account? <a href='{{ url_for('login') }}'>Login here</a>",
            "tts": "Please enter your details. First, say your name. Then phone number. Finally, select your language."
        },
        "hi": {
            "title": "खाता बनाएँ",
            "name": "नाम",
            "phone": "फ़ोन नंबर",
            "language": "भाषा चुनें",
            "signup": "साइन अप करें",
            "login": "पहले से खाता है? <a href='{{ url_for('login') }}'>यहाँ लॉगिन करें</a>",
            "tts": "कृपया अपनी जानकारी दर्ज करें। पहले नाम बताइए, फिर फोन नंबर और अंत में भाषा चुनें।"
        },
        "te": {
            "title": "ఖాతా సృష్టించండి",
            "name": "పేరు",
            "phone": "ఫోన్ నంబర్",
            "language": "భాషను ఎంచుకోండి",
            "signup": "సైన్ అప్ చేయండి",
            "login": "ఖాతా ఉందా? <a href='{{ url_for('login') }}'>ఇక్కడ లాగిన్ చేయండి</a>",
            "tts": "దయచేసి మీ వివరాలు నమోదు చేయండి. ముందుగా పేరు, తర్వాత ఫోన్ నంబర్, చివరగా భాషను ఎంచుకోండి."
        },
        "ml": {
            "title": "അക്കൗണ്ട് സൃഷ്ടിക്കുക",
            "name": "പേര്",
            "phone": "ഫോൺ നമ്പർ",
            "language": "ഭാഷ തിരഞ്ഞെടുക്കുക",
            "signup": "സൈൻ അപ്പ് ചെയ്യുക",
            "login": "അക്കൗണ്ട് ഉണ്ടോ? <a href='{{ url_for('login') }}'>ഇവിടെ ലോഗിൻ ചെയ്യുക</a>",
            "tts": "ദയവായി നിങ്ങളുടെ വിവരങ്ങൾ നൽകുക. ആദ്യം പേര്, പിന്നീട് ഫോൺ നമ്പർ, അവസാനം ഭാഷ തിരഞ്ഞെടുക്കുക."
        }
    };

    function changeLanguage(lang) {
        const t = translations[lang] || translations["en"];
        document.getElementById("form-title").innerText = t.title;
        document.getElementById("label-name").innerText = t.name;
        document.getElementById("label-phone").innerText = t.phone;
        document.getElementById("label-language").innerText = t.language;
        document.getElementById("btn-signup").innerText = t.signup;
        document.getElementById("login-text").innerHTML = t.login;

        speakText(t.tts, lang);
    }

    // Auto-detect location
    window.onload = function() {
        if (navigator.geolocation) {
            navigator.geolocation.getCurrentPosition(function(pos) {
                document.getElementById("location").value = pos.coords.latitude + "," + pos.coords.longitude;
            });
        }
        speakText(translations["en"].tts, "en");
    }

    // Text-to-Speech
    function speakText(text, lang) {
        let utterance = new SpeechSynthesisUtterance(text);
        if (lang === "hi") utterance.lang = "hi-IN";
        else if (lang === "te") utterance.lang = "te-IN";
        else if (lang === "ml") utterance.lang = "ml-IN";
        else utterance.lang = "en-US";
        speechSynthesis.speak(utterance);
    }

    // Voice input for any field
    function startVoiceInput(fieldId) {
        if (!('webkitSpeechRecognition' in window)) {
            alert("Your browser does not support voice input.");
            return;
        }
        const recognition = new webkitSpeechRecognition();
        recognition.lang = document.getElementById("language_preference").value + "-IN";
        recognition.onresult = function(event) {
            document.getElementById(fieldId).value = event.results[0][0].transcript;
        }
        recognition.start();
    }
</script>
{% endblock %}
