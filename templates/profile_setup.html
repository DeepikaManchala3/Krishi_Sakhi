{% extends "base.html" %}

{% block title %}Profile Setup - Krishi Sakhi{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-8">
        <div class="card">
            <div class="card-header text-center bg-success text-white">
                <h4><i class="fas fa-user-cog me-2"></i><span data-translate="setupProfile">Setup Your Farmer Profile</span></h4>
            </div>
            <div class="card-body">
                <form method="POST">
                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label for="name" class="form-label" data-translate="fullName">Full Name</label>
                            <input type="text" class="form-control" id="name" name="name" required 
                                   data-translate="namePlaceholder">
                        </div>
                        <div class="col-md-6 mb-3">
                            <label for="location" class="form-label" data-translate="location">Location</label>
                            <input type="text" class="form-control" id="location" name="location" required 
                                   data-translate="locationPlaceholder">
                        </div>
                    </div>
                    
                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label for="land_size" class="form-label" data-translate="landSize">Land Size (acres)</label>
                            <input type="number" step="0.1" class="form-control" id="land_size" name="land_size"
                                   data-translate="landSizePlaceholder">
                        </div>
                        <div class="col-md-6 mb-3">
                            <label for="crop_type" class="form-label" data-translate="primaryCrop">Primary Crop</label>
                            <select class="form-select" id="crop_type" name="crop_type">
                                <option value="" data-translate="selectCrop">Select Crop</option>
                                <option value="rice" data-translate="rice">Rice</option>
                                <option value="wheat" data-translate="wheat">Wheat</option>
                                <option value="sugarcane" data-translate="sugarcane">Sugarcane</option>
                                <option value="cotton" data-translate="cotton">Cotton</option>
                                <option value="vegetables" data-translate="vegetables">Vegetables</option>
                                <option value="fruits" data-translate="fruits">Fruits</option>
                                <option value="pulses" data-translate="pulses">Pulses</option>
                                <option value="oilseeds" data-translate="oilseeds">Oilseeds</option>
                                <option value="other" data-translate="other">Other</option>
                            </select>
                        </div>
                    </div>
                    
                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label for="soil_type" class="form-label" data-translate="soilType">Soil Type</label>
                            <select class="form-select" id="soil_type" name="soil_type">
                                <option value="" data-translate="selectSoil">Select Soil Type</option>
                                <option value="clay" data-translate="clay">Clay</option>
                                <option value="sandy" data-translate="sandy">Sandy</option>
                                <option value="loamy" data-translate="loamy">Loamy</option>
                                <option value="silt" data-translate="silt">Silt</option>
                                <option value="peaty" data-translate="peaty">Peaty</option>
                                <option value="chalky" data-translate="chalky">Chalky</option>
                                <option value="other" data-translate="other">Other</option>
                            </select>
                        </div>
                        <div class="col-md-6 mb-3">
                            <label for="irrigation_type" class="form-label" data-translate="irrigationMethod">Irrigation Method</label>
                            <select class="form-select" id="irrigation_type" name="irrigation_type">
                                <option value="" data-translate="selectIrrigation">Select Irrigation</option>
                                <option value="drip" data-translate="drip">Drip Irrigation</option>
                                <option value="sprinkler" data-translate="sprinkler">Sprinkler</option>
                                <option value="flood" data-translate="flood">Flood Irrigation</option>
                                <option value="canal" data-translate="canal">Canal Irrigation</option>
                                <option value="rainfed" data-translate="rainfed">Rain-fed</option>
                                <option value="other" data-translate="other">Other</option>
                            </select>
                        </div>
                    </div>
                    
                    <div class="mb-3">
                        <label for="experience_years" class="form-label" data-translate="experienceYears">Years of Farming Experience</label>
                        <input type="number" class="form-control" id="experience_years" name="experience_years"
                               data-translate="experiencePlaceholder">
                    </div>
                    
                    <div class="d-grid">
                        <button type="submit" class="btn btn-success btn-lg">
                            <i class="fas fa-save me-2"></i><span data-translate="completeSetup">Complete Setup</span>
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}

        // Wait for base translations to load
        setTimeout(function() {
            if (typeof translations !== 'undefined') {
                // Merge translations
                for (const lang in profileSetupTranslations) {
                    if (translations[lang]) {
                        translations[lang] = {...translations[lang], ...profileSetupTranslations[lang]};
                    } else {
                        translations[lang] = profileSetupTranslations[lang];
                    }
                }
                
                // Apply translations if language is already set
                if (typeof currentLanguage !== 'undefined') {
                    document.querySelectorAll('[data-translate]').forEach(function(element) {
                        const key = element.getAttribute('data-translate');
                        if (translations[currentLanguage] && translations[currentLanguage][key]) {
                            if (element.tagName === 'INPUT' || element.tagName === 'SELECT') {
                                element.placeholder = translations[currentLanguage][key];
                            } else {
                                element.textContent = translations[currentLanguage][key];
                            }
                        }
                    });
                }
            }
        }, 100);
    });
