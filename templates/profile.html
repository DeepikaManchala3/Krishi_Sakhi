{% extends "base.html" %}

{% block title %}Farmer Profile - Krishi Sakhi{% endblock %}

{% block content %}
<div class="container">
    <h2 data-translate="farmerProfile">Farmer Profile</h2>
    <!-- Changed action to use 'profile' instead of 'update_profile' -->
    <form method="POST" action="{{ url_for('profile') }}">
        <div class="mb-3">
            <label class="form-label" data-translate="name">Name</label>
            <input type="text" name="name" class="form-control" 
                   value="{{ current_user.farmer_profile.name if current_user.farmer_profile else '' }}" 
                   required data-translate="namePlaceholder">
        </div>
        <div class="mb-3">
            <label class="form-label" data-translate="location">Location</label>
            <input type="text" name="location" class="form-control" 
                   value="{{ current_user.farmer_profile.location if current_user.farmer_profile else '' }}" 
                   required data-translate="locationPlaceholder">
        </div>
        <div class="mb-3">
            <label class="form-label" data-translate="landSize">Land Size (acres)</label>
            <input type="number" name="land_size" class="form-control" 
                   value="{{ current_user.farmer_profile.land_size if current_user.farmer_profile else '' }}"
                   data-translate="landSizePlaceholder">
        </div>
        <div class="mb-3">
            <label class="form-label" data-translate="cropType">Crop Type</label>
            <select name="crop_type" class="form-control">
                <option value="" data-translate="selectCrop">Select Crop Type</option>
                <option value="rice" {% if current_user.farmer_profile and current_user.farmer_profile.crop_type == 'rice' %}selected{% endif %} data-translate="rice">Rice</option>
                <option value="wheat" {% if current_user.farmer_profile and current_user.farmer_profile.crop_type == 'wheat' %}selected{% endif %} data-translate="wheat">Wheat</option>
                <option value="sugarcane" {% if current_user.farmer_profile and current_user.farmer_profile.crop_type == 'sugarcane' %}selected{% endif %} data-translate="sugarcane">Sugarcane</option>
                <option value="cotton" {% if current_user.farmer_profile and current_user.farmer_profile.crop_type == 'cotton' %}selected{% endif %} data-translate="cotton">Cotton</option>
                <option value="vegetables" {% if current_user.farmer_profile and current_user.farmer_profile.crop_type == 'vegetables' %}selected{% endif %} data-translate="vegetables">Vegetables</option>
                <option value="fruits" {% if current_user.farmer_profile and current_user.farmer_profile.crop_type == 'fruits' %}selected{% endif %} data-translate="fruits">Fruits</option>
                <option value="pulses" {% if current_user.farmer_profile and current_user.farmer_profile.crop_type == 'pulses' %}selected{% endif %} data-translate="pulses">Pulses</option>
                <option value="oilseeds" {% if current_user.farmer_profile and current_user.farmer_profile.crop_type == 'oilseeds' %}selected{% endif %} data-translate="oilseeds">Oilseeds</option>
                <option value="other" {% if current_user.farmer_profile and current_user.farmer_profile.crop_type == 'other' %}selected{% endif %} data-translate="other">Other</option>
            </select>
        </div>
        <div class="mb-3">
            <label class="form-label" data-translate="soilType">Soil Type</label>
            <select name="soil_type" class="form-control">
                <option value="" data-translate="selectSoil">Select Soil Type</option>
                <option value="clay" {% if current_user.farmer_profile and current_user.farmer_profile.soil_type == 'clay' %}selected{% endif %} data-translate="clay">Clay</option>
                <option value="sandy" {% if current_user.farmer_profile and current_user.farmer_profile.soil_type == 'sandy' %}selected{% endif %} data-translate="sandy">Sandy</option>
                <option value="loamy" {% if current_user.farmer_profile and current_user.farmer_profile.soil_type == 'loamy' %}selected{% endif %} data-translate="loamy">Loamy</option>
                <option value="silt" {% if current_user.farmer_profile and current_user.farmer_profile.soil_type == 'silt' %}selected{% endif %} data-translate="silt">Silt</option>
                <option value="peaty" {% if current_user.farmer_profile and current_user.farmer_profile.soil_type == 'peaty' %}selected{% endif %} data-translate="peaty">Peaty</option>
                <option value="chalky" {% if current_user.farmer_profile and current_user.farmer_profile.soil_type == 'chalky' %}selected{% endif %} data-translate="chalky">Chalky</option>
                <option value="other" {% if current_user.farmer_profile and current_user.farmer_profile.soil_type == 'other' %}selected{% endif %} data-translate="other">Other</option>
            </select>
        </div>
        <div class="mb-3">
            <label class="form-label" data-translate="irrigationType">Irrigation Type</label>
            <select name="irrigation_type" class="form-control">
                <option value="" data-translate="selectIrrigation">Select Irrigation Type</option>
                <option value="drip" {% if current_user.farmer_profile and current_user.farmer_profile.irrigation_type == 'drip' %}selected{% endif %} data-translate="drip">Drip Irrigation</option>
                <option value="sprinkler" {% if current_user.farmer_profile and current_user.farmer_profile.irrigation_type == 'sprinkler' %}selected{% endif %} data-translate="sprinkler">Sprinkler Irrigation</option>
                <option value="flood" {% if current_user.farmer_profile and current_user.farmer_profile.irrigation_type == 'flood' %}selected{% endif %} data-translate="flood">Flood Irrigation</option>
                <option value="canal" {% if current_user.farmer_profile and current_user.farmer_profile.irrigation_type == 'canal' %}selected{% endif %} data-translate="canal">Canal Irrigation</option>
                <option value="rainfed" {% if current_user.farmer_profile and current_user.farmer_profile.irrigation_type == 'rainfed' %}selected{% endif %} data-translate="rainfed">Rainfed</option>
                <option value="other" {% if current_user.farmer_profile and current_user.farmer_profile.irrigation_type == 'other' %}selected{% endif %} data-translate="other">Other</option>
            </select>
        </div>
        <div class="mb-3">
            <label class="form-label" data-translate="experienceYears">Experience Years</label>
            <input type="number" name="experience_years" class="form-control" 
                   value="{{ current_user.farmer_profile.experience_years if current_user.farmer_profile else '' }}"
                   min="0" max="80" data-translate="experiencePlaceholder">
        </div>
        <button type="submit" class="btn btn-success" data-translate="updateProfile">Update Profile</button>
    </form>
</div>
{% endblock %}

    document.addEventListener('DOMContentLoaded', function() {
        // Wait for base translations to load
        setTimeout(function() {
            if (typeof translations !== 'undefined') {
                // Merge translations
                for (const lang in profileTranslations) {
                    if (translations[lang]) {
                        translations[lang] = {...translations[lang], ...profileTranslations[lang]};
                    } else {
                        translations[lang] = profileTranslations[lang];
                    }
                }
                
                // Apply translations if language is already set
                if (typeof currentLanguage !== 'undefined') {
                    document.querySelectorAll('[data-translate]').forEach(function(element) {
                        const key = element.getAttribute('data-translate');
                        if (translations[currentLanguage] && translations[currentLanguage][key]) {
                            if (element.tagName === 'INPUT' || element.tagName === 'SELECT') {
                                element.placeholder = translations[currentLanguage][key];
                            } else {
                                element.textContent = translations[currentLanguage][key];
                            }
                        }
                    });
                }
            }
        }, 100);
    });
